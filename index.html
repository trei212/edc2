];

function getFestPhase(now=Date.now()){
  const t=new Date(now);
  if(t<DAY_STARTS[0])return{phase:'pre'};
  if(t>FEST_END)return{phase:'post'};
  for(let i=2;i>=0;i--){const end=new Date(DAY_STARTS[i].getTime()+12.5*3600000);if(t>=DAY_STARTS[i]&&t<=end)return{phase:'live',day:i+1,dayStart:DAY_STARTS[i]};}
  for(let i=0;i<2;i++){const pe=new Date(DAY_STARTS[i].getTime()+12.5*3600000);if(t>pe&&t<DAY_STARTS[i+1])return{phase:'inter',nextDay:i+2,nextStart:DAY_STARTS[i+1]};}
  return{phase:'live',day:1,dayStart:DAY_STARTS[0]};
}
function getLiveData(day,dayStart,selectedIds,now=Date.now()){
  const elapsed=(now-dayStart.getTime())/60000;
  const festMin=17*60+elapsed;
  const daySets=SCHEDULE.filter(s=>s.day===day&&MAIN_STAGES.includes(s.stage));
  return{playing:daySets.filter(s=>festMin>=toM(s.s)&&festMin<toM(s.e)),upcoming:daySets.filter(s=>toM(s.s)>festMin).sort((a,b)=>toM(a.s)-toM(b.s)),festMin};
}

/* ─── CONFLICT RECON ───────────────────────────────────────────────── */
function reconflict(selectedIds){
  const result={};
  for(const day of[1,2,3]){
    const daySel=SCHEDULE.filter(s=>selectedIds.includes(s.id)&&s.day===day).sort((a,b)=>toM(a.cs)-toM(b.cs));
    const recon=daySel.map(s=>({...s}));
    for(let i=0;i<recon.length-1;i++){
      const a=recon[i],b=recon[i+1],overlap=toM(a.ce)-toM(b.cs);
      if(overlap>0){if(overlap<=15){recon[i]={...a,ce:b.cs,trimmed:true,trimMin:overlap};}else{recon[i]={...a,conflict:true};recon[i+1]={...b,conflict:true};}}
    }
    recon.forEach(s=>{result[s.id]=s;});
  }
  return result;
}

<script type="text/babel" data-presets="react">
/* ─── APP STATE ─────────────────────────────────────────────────────── */
function useApp(){
  const sharedOnLoad=React.useMemo(()=>parseSharedHash(),[]);
  const[selected,setSelected]=React.useState(()=>LS.get('sel',[]));
  const[crew,setCrew]=React.useState(()=>LS.get('crew',[]));

  const[sharedIds,setSharedIds]=React.useState(sharedOnLoad);
  const[weather,setWeather]=React.useState(()=>LS.get('weather',null));
  React.useEffect(()=>{LS.set('sel',selected);},[selected]);
  React.useEffect(()=>{LS.set('crew',crew);},[crew]);
  React.useEffect(()=>{LS.set('markers',markers);},[markers]);
  React.useEffect(()=>{LS.set('mapPins',mapPins);},[mapPins]);
  React.useEffect(()=>{
    async function fw(){try{const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.2716&longitude=-115.0116&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=America%2FLos_Angeles');const d=await r.json();const code=d.current.weather_code,temp=Math.round(d.current.temperature_2m);const cond=code<=1?'Clear':code<=3?'Cloudy':code<=67?'Rain':'Storm';const w={temp,cond,updated:Date.now()};setWeather(w);LS.set('weather',w);}catch{}}
    const c=LS.get('weather',null);if(!c||Date.now()-c.updated>1800000)fw();
  },[]);
  const recon=React.useMemo(()=>reconflict(selected),[selected]);
  const toggleSet=React.useCallback((id)=>{hap();setSelected(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);},[]);
  return{selected,toggleSet,recon,crew,setCrew,markers,setMarkers,mapPins,setMapPins,sharedIds,setSharedIds,weather};
}
function useClock(){const[now,setNow]=React.useState(Date.now());React.useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),1000);return()=>clearInterval(t);},[]);return now;}

/* ─── BADGE SYSTEM ──────────────────────────────────────────────────── */
// Returns badge type for a selected set based on recon
function getBadge(setId,recon){
  const r=recon[setId];
  if(!r)return null;
  if(r.conflict)return'conflict';
  if(r.trimmed)return'part';
  return'must';
}
function Badge({type,small=false}){
  const cfg={

}

/* ─── ARTIST NAME ───────────────────────────────────────────────────── */
function ArtistName({name,size=16,color='#fff'}){

/* ─── HOME SCREEN ─────────────────────────────────────────────────────── */
function HomeScreen({selected,toggleSet,recon,sharedIds,weather}){
  // Preview time state — null means not set (shows default pre-event look)
  const[previewTime,setPreviewTime]=React.useState('');
  const[previewDay,setPreviewDay]=React.useState(1);
  const realNow=useClock();

  // Compute simulated "now" from preview time or real clock
  const simNow=React.useMemo(()=>{
    if(!previewTime)return realNow;
    const[h,m]=previewTime.split(':').map(Number);
    const base=new Date(DAY_STARTS[previewDay-1]);
    base.setHours(0,0,0,0);
    // Festival time: if h < 17 assume next day (post-midnight sets)
    const festDate=new Date(DAY_STARTS[previewDay-1]);
    festDate.setHours(h,m,0,0);
    // If time < 10 AM, it's past midnight, advance a day
    if(h<10)festDate.setDate(festDate.getDate()+1);
    return festDate.getTime();
  },[previewTime,previewDay,realNow]);

  const phase=getFestPhase(simNow);

  return(

    <div style={{position:'relative',zIndex:50}}>

            </div>
          );})}
        </div>
      )}
    </div>
  );
}

/* ─── LINEUP SCREEN ──────────────────────────────────────────────────── */
function LineupScreen({selected,toggleSet,recon,sharedIds}){

  const allMainSets=React.useMemo(()=>SCHEDULE.filter(s=>MAIN_STAGES.includes(s.stage)),[]);

/* ─── GRID VIEW ──────────────────────────────────────────────────────── */
function GridView({selected,toggleSet,recon,sharedIds,onBack,allMainSets}){
  const[day,setDay]=React.useState(1);
  const now=useClock();const phase=getFestPhase(now);
  // Horizontal: stages = rows (left), time = columns (top), horizontal scroll for time
  // Row height: fit all 9 stages. Time columns: 110px wide for legibility
  const LCOL=90;   // stage label column width
  const HOUR_W=110; // width per hour — wide enough for text
  const FEST_START=17*60,FEST_END=29*60+30,TOTAL=FEST_END-FEST_START;
  const hours=Array.from({length:13},(_,i)=>17+i);
  const TOTAL_W=hours.length*HOUR_W;
  const daySets=React.useMemo(()=>SCHEDULE.filter(s=>s.day===day&&MAIN_STAGES.includes(s.stage)),[day]);

  // Row height: fill available space for all 9 stages
  const[containerH,setContainerH]=React.useState(400);
  const containerRef=React.useRef();
  React.useEffect(()=>{
    if(!containerRef.current)return;
    const obs=new ResizeObserver(entries=>{for(const e of entries)setContainerH(e.contentRect.height);});
    obs.observe(containerRef.current);return()=>obs.disconnect();
  },[]);
  // Each row gets equal height; min 64px for readability
  const ROW_H=Math.max(64,Math.floor(containerH/MAIN_STAGES.length));

  let nowX=null;
  if(phase.phase==='live'&&phase.day===day){const elapsed=(now-phase.dayStart.getTime())/60000;nowX=((17*60+elapsed-FEST_START)/TOTAL)*TOTAL_W;}

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'#000'}}>
      <div style={{flexShrink:0,background:'#000'}}>
        <ScreenHeader img={H('header-grid.webp')} height={180} title="GRID" copy={COPY.grid}
          extra={<div style={{display:'flex',gap:7,alignItems:'center'}}>
            <button onClick={onBack} style={{fontSize:12,padding:'6px 12px',border:'2px solid rgba(255,255,255,.22)',borderRadius:8,color:'rgba(255,255,255,.55)',background:'#000',cursor:'pointer',fontFamily:'Sora,sans-serif',fontWeight:700}}>← LINEUP</button>
            {[['FRI',1],['SAT',2],['SUN',3]].map(([l,d])=>(
              <button key={d} onClick={()=>setDay(d)} style={{padding:'6px 16px',borderRadius:16,fontWeight:700,fontSize:11,fontFamily:'Sora,sans-serif',background:day===d?STAGE_CFG.kineticFIELD.p:'#000',color:day===d?'#000':'rgba(255,255,255,.45)',border:`2px solid ${day===d?STAGE_CFG.kineticFIELD.p:'rgba(255,255,255,.22)'}`,cursor:'pointer'}}>{l}</button>
            ))}
          </div>}
        />
      </div>

      {/* Grid body — horizontal scroll for time, fixed height for stages */}
      <div ref={containerRef} style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',background:'#000'}}>
        <div style={{overflowX:'auto',flex:1,display:'flex',flexDirection:'column'}}>
          <div style={{minWidth:LCOL+TOTAL_W,display:'flex',flexDirection:'column',height:'100%'}}>
            {/* Sticky time header */}
            <div style={{display:'flex',flexShrink:0,position:'sticky',top:0,zIndex:30,background:'#000',borderBottom:'2px solid rgba(255,255,255,.22)'}}>
              <div style={{width:LCOL,flexShrink:0,borderRight:'2px solid rgba(255,255,255,.18)',display:'flex',alignItems:'center',justifyContent:'center',padding:'8px 4px'}}>
                <span style={{fontFamily:'Space Mono,monospace',fontSize:9,color:'rgba(255,255,255,.35)',letterSpacing:'.1em',textTransform:'uppercase'}}>TIME</span>
              </div>
              {hours.map(h=>(
                <div key={h} style={{width:HOUR_W,flexShrink:0,padding:'10px 0',textAlign:'center',borderRight:'1px solid rgba(255,255,255,.1)'}}>
                  <span style={{fontFamily:'Space Mono,monospace',fontSize:12,color:'rgba(255,255,255,.7)',fontWeight:700}}>{h>=24?(h-24)+':00':h+':00'}</span>
                </div>
              ))}
            </div>

            {/* Stage rows — fill remaining height */}
            <div style={{flex:1,display:'flex',flexDirection:'column'}}>
              {MAIN_STAGES.map((sg,ri)=>{
                const sc=STAGE_CFG[sg];const stageSets=daySets.filter(s=>s.stage===sg);
                return(
                  <div key={sg} style={{display:'flex',flex:1,borderBottom:ri<MAIN_STAGES.length-1?'2px solid rgba(255,255,255,.1)':'none',minHeight:ROW_H}}>
                    {/* Stage label — emblem + name */}
                    <div style={{width:LCOL,flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,padding:'6px 4px',borderRight:'2px solid rgba(255,255,255,.18)',background:'#000',position:'sticky',left:0,zIndex:10}}>
                      <img src={EMB(sc.key)} alt={sc.label} style={{width:Math.min(ROW_H-20,56),height:Math.min(ROW_H-20,56),objectFit:'contain'}}/>
                      <div style={{fontFamily:'Sora,sans-serif',fontSize:7.5,color:sc.p,fontWeight:800,textAlign:'center',letterSpacing:'.04em',textTransform:'uppercase',lineHeight:1.2,wordBreak:'break-word',padding:'0 2px'}}>{sc.label}</div>
                    </div>
                    {/* Timeline */}
                    <div style={{position:'relative',flex:1,background:'#000',overflow:'hidden'}}>
                      {/* Hour lines */}
                      {hours.map(h=><div key={h} style={{position:'absolute',left:((h*60-FEST_START)/TOTAL)*TOTAL_W,top:0,bottom:0,width:1,background:'rgba(255,255,255,.07)'}}/>)}
                      {/* Now line */}
                      {nowX!==null&&<div style={{position:'absolute',left:nowX,top:0,bottom:0,width:2,background:'#ff2d78',zIndex:20}}/>}
                      {/* Set blocks */}
                      {stageSets.map(s=>{
                        const isSel=selected.includes(s.id);const isShared=sharedIds?.includes(s.id);const rec=recon[s.id]||s;
                        const badge=isSel?getBadge(s.id,recon):null;
                        const isPart=badge==='part';const isConflict=badge==='conflict';
                        const left=((toM(s.s)-FEST_START)/TOTAL)*TOTAL_W;
                        const width=Math.max(((toM(s.e)-toM(s.s))/TOTAL)*TOTAL_W-2,36);
                        const gc=GENRES[s.g]||GENRES['Electronic'];
                        return(
                          <div key={s.id} onClick={()=>toggleSet(s.id)} style={{
                            position:'absolute',left,width,top:4,bottom:4,
                            background:isSel?(isConflict?'rgba(255,23,68,.3)':isPart?`${sc.p}44`:sc.p):`${sc.p}35`,
                            border:`2px solid ${isSel?(isConflict?'#ff1744':isPart?'#ff9800':sc.p):sc.p+'77'}`,
                            borderTop:`3px solid ${isSel?(isConflict?'#ff1744':isPart?'#ff9800':sc.p):sc.p}`,
                            borderRadius:7,padding:'5px 7px',overflow:'hidden',cursor:'pointer',transition:'all .14s',
                            position:'absolute',
                          }}>
                            {/* Diagonal stripe for PART */}
                            {isPart&&<div style={{position:'absolute',inset:0,backgroundImage:'repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(0,0,0,.2) 6px,rgba(0,0,0,.2) 12px)',pointerEvents:'none'}}/>}
                            {/* Badge */}
                            {badge&&<div style={{marginBottom:3}}><Badge type={badge} small/></div>}
                            {/* Artist name */}
                            <div style={{fontFamily:'Sora,sans-serif',fontWeight:800,fontSize:9.5,color:'#fff',lineHeight:1.2,textTransform:'uppercase',position:'relative',zIndex:1}}>
                              {s.artist.replace(/\s+B2B\s+/g,' B2B ').split(' B2B ').map((p,i,a)=>(
                                <span key={i} style={{display:'block'}}>{p}{i<a.length-1&&<span style={{fontSize:6.5,opacity:.55,marginLeft:2}}>B2B</span>}</span>
                              ))}
                            </div>
                            {/* Time */}
                            {width>70&&(
                              <div style={{fontFamily:'Space Mono,monospace',fontSize:8,color:isSel?'rgba(255,255,255,.85)':'rgba(255,255,255,.65)',marginTop:3,position:'relative',zIndex:1}}>
                                {isSel&&isPart?`${fmtT(rec.cs)}–${fmtT(rec.ce)}`:fmtT(s.s)}
                              </div>
                            )}
                            {/* Genre */}
                            {width>90&&(
                              <div style={{fontFamily:'DM Sans,sans-serif',fontSize:7.5,color:gc.color,fontWeight:700,textTransform:'uppercase',marginTop:2,position:'relative',zIndex:1}}>{s.g}</div>
                            )}
                            {isShared&&!isSel&&<div style={{position:'absolute',top:3,right:3,width:5,height:5,borderRadius:'50%',background:'#fff',zIndex:2}}/>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── EXPORT SCREEN ──────────────────────────────────────────────────── */
function ExportScreen({selected,recon,markers,onBack}){
  const[template,setTemplate]=React.useState('poster');
  const[day,setDay]=React.useState(1);
  const[ratio,setRatio]=React.useState('9:16');
  const[exporting,setExporting]=React.useState(false);
  const canvasRef=React.useRef();
  const RATIOS={'9:16':[1080,1920],'4:5':[1080,1350],'1:1':[1080,1080],'19.5:9':[1920,882]};
  const TEMPLATES=[{id:'poster',label:'POSTER'},{id:'ticket',label:'TICKET'},{id:'timetable',label:'TIMETABLE'},{id:'arc',label:'NIGHT ARC'}];
  const selSets=React.useMemo(()=>SCHEDULE.filter(s=>selected.includes(s.id)&&s.day===day&&MAIN_STAGES.includes(s.stage)).sort((a,b)=>toM(a.s)-toM(b.s)).filter(s=>{const r=recon[s.id]||s;return toM(r.ce)>toM(r.cs);}),[selected,day,recon]);
  const dayMarkers=React.useMemo(()=>markers.filter(m=>!m.day||m.day===day),[markers,day]);

  function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

  async function loadImg(src){return new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.onerror=()=>res(null);i.src=src;});}

  async function renderExport(canvas){
    const W=canvas.width,H=canvas.height;const ctx=canvas.getContext('2d');
    await document.fonts.ready;
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

    // ── HEADER: use the in-app header-home-pre.webp (has EDC logo baked in) ──
    const headerImg=await loadImg(H('header-home-pre.webp'));
    const HEADER_H=Math.round(H*.28); // 28% of canvas height
    if(headerImg){
      // Draw header scaled to full width, crop to HEADER_H
      const scale=W/headerImg.naturalWidth;
      const ih=headerImg.naturalHeight*scale;
      // Center vertically, show top portion where logo lives
      ctx.drawImage(headerImg,0,0,W,Math.max(HEADER_H,ih));
      // Clip to HEADER_H
      ctx.fillStyle='#000';
      // Draw a fade at bottom of header
      const hg=ctx.createLinearGradient(0,HEADER_H-60,0,HEADER_H);
      hg.addColorStop(0,'rgba(0,0,0,0)');hg.addColorStop(1,'rgba(0,0,0,1)');
      ctx.fillStyle=hg;ctx.fillRect(0,HEADER_H-60,W,60);
    }

    // Day subtitle
    ctx.font=`300 ${W*.026}px DM Sans,sans-serif`;ctx.fillStyle='rgba(255,255,255,.45)';ctx.textAlign='center';
    const dg=ctx.createLinearGradient(0,0,0,1);ctx.letterSpacing=`${W*.014}px`;
    ctx.fillText(`${DAYS_LABEL[day-1].toUpperCase()} · MAY ${15+day-1}`,W/2,HEADER_H+W*.05);ctx.letterSpacing='0px';

    // Divider
    const divY=HEADER_H+W*.075;
    const lg=ctx.createLinearGradient(W*.05,0,W*.95,0);lg.addColorStop(0,'transparent');lg.addColorStop(.5,'rgba(255,255,255,.3)');lg.addColorStop(1,'transparent');
    ctx.strokeStyle=lg;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(W*.05,divY);ctx.lineTo(W*.95,divY);ctx.stroke();

    // ── SET LIST ──
    const pad=W*.055;let y=divY+H*.025;
    const sortedItems=[...dayMarkers.filter(m=>!m.day||m.day===day).map(m=>({type:'marker',data:m})),...selSets.map(s=>({type:'set',data:s}))].sort((a,b)=>{const ta=a.type==='marker'?toM(a.data.time||'19:00'):toM(a.data.s);const tb=b.type==='marker'?toM(b.data.time||'19:00'):toM(b.data.s);return ta-tb;});

    // Calculate available height for sets
    const FOOTER_H=H*.07;const AVAIL=H-y-FOOTER_H;
    const SET_COUNT=sortedItems.filter(i=>i.type==='set').length||1;
    const ROW_H=Math.min(H*.085,AVAIL/Math.max(sortedItems.length,1));

    for(const item of sortedItems){
      if(y+ROW_H>H-FOOTER_H)break;
      if(item.type==='marker'){
        const mc=item.data.color||'#FFD700';
        const mg=ctx.createLinearGradient(pad,0,W-pad,0);mg.addColorStop(0,'transparent');mg.addColorStop(.5,mc+'66');mg.addColorStop(1,'transparent');
        ctx.strokeStyle=mg;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad,y+8);ctx.lineTo(W-pad,y+8);ctx.stroke();
        ctx.font=`700 ${W*.02}px Space Mono,monospace`;ctx.fillStyle=mc;ctx.textAlign='center';ctx.fillText(`${item.data.label||''}${item.data.time?' · '+fmtT(item.data.time):''}`,W/2,y+22);
        y+=H*.035;continue;
      }
      const s=item.data;const sc=STAGE_CFG[s.stage];const rec=recon[s.id]||s;const gc=GENRES[s.g]||GENRES['Electronic'];
      const badge=getBadge(s.id,recon);const isPart=badge==='part';const isConflict=badge==='conflict';
      const badgeColor=isConflict?'#ff1744':isPart?'#ff9800':'#00c853';
      const badgeLabel=isConflict?'CONFLICT':isPart?'PART':'MUST';

      // Row bg
      ctx.fillStyle=`${sc.p}12`;roundRect(ctx,pad,y,W-pad*2,ROW_H,W*.014);ctx.fill();
      // Left border
      ctx.fillStyle=badgeColor;ctx.fillRect(pad,y,W*.008,ROW_H);
      // Diagonal stripe for PART
      if(isPart){
        ctx.save();ctx.beginPath();roundRect(ctx,pad,y,W-pad*2,ROW_H,W*.014);ctx.clip();
        ctx.fillStyle='rgba(255,152,0,.07)';
        for(let xi=0;xi<W*2;xi+=20){ctx.fillRect(xi,y,10,ROW_H);}
        ctx.restore();
      }
      // Badge
      ctx.fillStyle=badgeColor;roundRect(ctx,pad+W*.015,y+ROW_H*.12,W*.09,ROW_H*.32,4);ctx.fill();
      ctx.font=`800 ${W*.016}px Sora,sans-serif`;ctx.fillStyle=isConflict?'#fff':'#000';ctx.textAlign='center';ctx.fillText(badgeLabel,pad+W*.015+W*.045,y+ROW_H*.34);
      // Artist name
      ctx.font=`800 ${ROW_H*.3}px Sora,sans-serif`;ctx.fillStyle='#fff';ctx.textAlign='left';
      let aText=s.artist;const maxW=(W-pad*2)*.58;while(ctx.measureText(aText).width>maxW&&aText.length>4)aText=aText.slice(0,-1);if(aText!==s.artist)aText+='…';
      ctx.fillText(aText,pad+W*.12,y+ROW_H*.52);
      // Genre
      ctx.font=`700 ${ROW_H*.22}px DM Sans,sans-serif`;ctx.fillStyle=gc.color;ctx.fillText(s.g.toUpperCase(),pad+W*.12,y+ROW_H*.82);
      // Time display
      ctx.textAlign='right';ctx.font=`400 ${ROW_H*.2}px Space Mono,monospace`;ctx.fillStyle='rgba(255,255,255,.4)';
      ctx.fillText(`${fmtT(s.s)}–${fmtT(s.e)}`,W-pad,y+ROW_H*.42);
      // Catch info
      const totalM=toM(s.e)-toM(s.s);const catchM=toM(rec.ce)-toM(rec.cs);const isFull=catchM>=totalM-1;
      const barW=W*.24;const bx=W-pad-barW;const bh=ROW_H*.15;const by2=y+ROW_H*.55;
      ctx.fillStyle='rgba(255,255,255,.15)';roundRect(ctx,bx,by2,barW,bh,bh/2);ctx.fill();
      if(isFull){ctx.fillStyle=sc.p;roundRect(ctx,bx,by2,barW,bh,bh/2);ctx.fill();}
      else{const cL=Math.max(0,((toM(rec.cs)-toM(s.s))/totalM)*barW);const cW=Math.max(6,(catchM/totalM)*barW);ctx.fillStyle=badgeColor;roundRect(ctx,bx+cL,by2,Math.min(cW,barW-cL),bh,bh/2);ctx.fill();}
      ctx.font=`700 ${ROW_H*.19}px Space Mono,monospace`;ctx.fillStyle=isFull?sc.p:badgeColor;ctx.textAlign='right';
      ctx.fillText(isFull?'FULL SET':`${fmtT(rec.cs)}–${fmtT(rec.ce)}`,W-pad,y+ROW_H*.88);
      y+=ROW_H+H*.008;
    }

    if(selSets.length===0){
      ctx.font=`300 ${W*.04}px DM Sans,sans-serif`;ctx.fillStyle='rgba(255,255,255,.2)';ctx.textAlign='center';ctx.fillText('No sets selected',W/2,H*.6);
    }

    // ── FOOTER: PEACE LOVE UNITY RESPECT ──
    const footY=H*.935;
    const fg=ctx.createLinearGradient(W*.05,0,W*.95,0);fg.addColorStop(0,'transparent');fg.addColorStop(.5,'rgba(255,255,255,.2)');fg.addColorStop(1,'transparent');
    ctx.strokeStyle=fg;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(W*.05,footY-10);ctx.lineTo(W*.95,footY-10);ctx.stroke();
    ctx.font=`700 ${W*.025}px Space Mono,monospace`;ctx.fillStyle='rgba(255,255,255,.45)';ctx.textAlign='center';ctx.letterSpacing=`${W*.014}px`;
    ctx.fillText('PEACE LOVE UNITY RESPECT',W/2,footY+H*.02);ctx.letterSpacing='0px';
    ctx.font=`300 ${W*.016}px Space Mono,monospace`;ctx.fillStyle='rgba(255,255,255,.2)';
    ctx.fillText('MY EDC LV 2026',W/2,footY+H*.045);
  }

  async function doExport(){
    setExporting(true);
    try{
      const[W,He]=RATIOS[ratio]||[1080,1920];
      const canvas=canvasRef.current;canvas.width=W;canvas.height=He;
      await renderExport(canvas);
      canvas.toBlob(blob=>{
        if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],'edc-schedule.png',{type:'image/png'})]})){
          navigator.share({files:[new File([blob],'edc-schedule.png',{type:'image/png'})],title:'My EDC 2026'}).catch(()=>{});
        }else{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`edc-2026-${['fri','sat','sun'][day-1]}.png`;a.click();}
        setExporting(false);
      },'image/png');
    }catch(e){console.error(e);setExporting(false);}
  }

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'#000'}}>
      <canvas ref={canvasRef} style={{display:'none'}}/>
      <div style={{flexShrink:0,background:'#000'}}>
        <ScreenHeader img={H('header-export.webp')} height={150}
          extra={<div style={{display:'flex',alignItems:'center',gap:10}}>
            <button onClick={onBack} style={{fontSize:18,padding:'3px 6px',color:'rgba(255,255,255,.55)',background:'none',border:'none',cursor:'pointer'}}>←</button>
            <div style={{fontFamily:'Sora,sans-serif',fontWeight:800,fontSize:28,letterSpacing:'-.02em',textTransform:'uppercase'}}>EXPORT</div>
          </div>}
        />
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'14px 16px 104px',background:'#000'}}>
        {/* Day */}
        <div style={{marginBottom:18}}>
          <div style={{fontSize:10,color:'rgba(255,255,255,.38)',letterSpacing:'.18em',textTransform:'uppercase',marginBottom:10,fontFamily:'DM Sans,sans-serif',fontWeight:700}}>DAY</div>
          <div style={{display:'flex',gap:7}}>
            {[['FRIDAY',1],['SATURDAY',2],['SUNDAY',3]].map(([l,d])=>(
              <button key={d} onClick={()=>setDay(d)} style={{padding:'9px 14px',borderRadius:10,fontWeight:700,fontSize:12,fontFamily:'Sora,sans-serif',background:day===d?STAGE_CFG.kineticFIELD.p:'#000',color:day===d?'#000':'rgba(255,255,255,.42)',border:`2px solid ${day===d?STAGE_CFG.kineticFIELD.p:'rgba(255,255,255,.22)'}`,cursor:'pointer',textTransform:'uppercase'}}>{l}</button>
            ))}
          </div>
        </div>
        {/* Ratio */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:10,color:'rgba(255,255,255,.38)',letterSpacing:'.18em',textTransform:'uppercase',marginBottom:10,fontFamily:'DM Sans,sans-serif',fontWeight:700}}>RATIO</div>
          <div style={{display:'flex',gap:7}}>
            {['9:16','4:5','1:1','19.5:9'].map(r=>(
              <button key={r} onClick={()=>setRatio(r)} style={{padding:'8px 14px',borderRadius:9,border:`2px solid ${ratio===r?'rgba(255,255,255,.6)':'rgba(255,255,255,.2)'}`,background:'#000',color:ratio===r?'#fff':'rgba(255,255,255,.38)',fontFamily:'Space Mono,monospace',fontSize:11,cursor:'pointer'}}>{r}</button>
            ))}
          </div>
        </div>
        {/* Sets count */}
        {selSets.length>0&&(
          <div style={{background:'#000',border:'2px solid rgba(255,255,255,.14)',borderRadius:12,padding:'13px 16px',marginBottom:18}}>
            <div style={{fontFamily:'Sora,sans-serif',fontWeight:800,color:'#fff',fontSize:14,marginBottom:4}}>{selSets.length} SETS · {DAYS_LABEL[day-1].toUpperCase()}</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {selSets.map(s=>{const badge=getBadge(s.id,recon);return badge?<Badge key={s.id} type={badge} small/>:null;})}
            </div>
          </div>
        )}
        {selSets.length===0&&<div style={{background:'#000',border:'2px solid rgba(255,85,85,.4)',borderRadius:12,padding:'13px 16px',marginBottom:18,color:'rgba(255,85,85,.8)',fontSize:13,fontFamily:'DM Sans,sans-serif',fontWeight:600,textTransform:'uppercase'}}>⚠ No sets selected for {DAYS_LABEL[day-1]}</div>}
        {/* Export button */}

/* ─── MAP SCREEN ─────────────────────────────────────────────────────── */
function MapScreen({mapPins,setMapPins,markers,crew}){
  const[zoom,setZoom]=React.useState(1);const[pan,setPan]=React.useState({x:0,y:0});const[selPin,setSelPin]=React.useState(null);const[addMode,setAddMode]=React.useState(false);const[addForm,setAddForm]=React.useState({label:'',time:'',color:'#00d4ff',icon:'meetup'});const touchRef=React.useRef({});
  const PIN_ICONS={meetup:UTIL_IC('utility-meet-up-point'),totem:UTIL_IC('utility-totem'),water:UTIL_IC('utility-water'),restroom:UTIL_IC('utility-restroom'),food:UTIL_IC('utility-food-and-drink'),charging:UTIL_IC('utility-charging'),shuttle:UTIL_IC('utility-shuttle'),rideshare:UTIL_IC('utility-rideshare'),entrance:UTIL_IC('utility-entrance'),exit:UTIL_IC('utility-exit')};
  function onTS(e){if(e.touches.length===2){touchRef.current.pinching=true;touchRef.current.sd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);touchRef.current.sz=zoom;}else if(e.touches.length===1){touchRef.current.dragging=true;touchRef.current.sx=e.touches[0].clientX-pan.x;touchRef.current.sy=e.touches[0].clientY-pan.y;}}
  function onTM(e){if(touchRef.current.pinching&&e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);setZoom(Math.min(4,Math.max(.5,touchRef.current.sz*d/touchRef.current.sd)));}else if(touchRef.current.dragging&&e.touches.length===1&&zoom>1){setPan({x:e.touches[0].clientX-touchRef.current.sx,y:e.touches[0].clientY-touchRef.current.sy});}}
  function onTE(){touchRef.current.pinching=false;touchRef.current.dragging=false;}

    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'#000'}}>

            <button onClick={()=>setAddMode(!addMode)} style={{display:'flex',alignItems:'center',gap:6,padding:'7px 14px',borderRadius:10,fontSize:12,fontWeight:700,fontFamily:'Sora,sans-serif',border:`2px solid ${addMode?STAGE_CFG.kineticFIELD.p:'rgba(255,255,255,.22)'}`,background:'#000',color:addMode?STAGE_CFG.kineticFIELD.p:'rgba(255,255,255,.55)',cursor:'pointer',textTransform:'uppercase'}}>
              <img src={addMode?ACT_IC('action-more'):ACT_IC('action-add')} alt="" style={{width:14,height:14,mixBlendMode:'screen'}}/>{addMode?'CANCEL':'+ PIN'}
            </button>
          </div>}
        />
        {addMode&&(
          <div style={{padding:'12px 16px 14px',background:'#000',borderBottom:'2px solid rgba(255,255,255,.16)'}}>
            <div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:10}}>
              {Object.keys(PIN_ICONS).map(k=>(
                <button key={k} onClick={()=>setAddForm(f=>({...f,icon:k}))} style={{flexShrink:0,display:'flex',alignItems:'center',gap:4,padding:'5px 10px',borderRadius:10,border:`2px solid ${addForm.icon===k?STAGE_CFG.kineticFIELD.p:'rgba(255,255,255,.2)'}`,background:'#000',fontSize:10,color:addForm.icon===k?STAGE_CFG.kineticFIELD.p:'rgba(255,255,255,.4)',fontWeight:700,fontFamily:'DM Sans,sans-serif',textTransform:'uppercase',cursor:'pointer'}}>
                  <img src={PIN_ICONS[k]} alt="" style={{width:13,height:13,mixBlendMode:'screen'}}/>{k}
                </button>
              ))}
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input value={addForm.label} onChange={e=>setAddForm(f=>({...f,label:e.target.value}))} placeholder="LABEL" style={{flex:2,background:'#000',border:'2px solid rgba(255,255,255,.22)',borderRadius:8,padding:'9px 12px',color:'#fff',fontSize:13,outline:'none',textTransform:'uppercase'}}/>
              <input value={addForm.time} onChange={e=>setAddForm(f=>({...f,time:e.target.value}))} placeholder="TIME" style={{flex:1,background:'#000',border:'2px solid rgba(255,255,255,.22)',borderRadius:8,padding:'9px 12px',color:'#fff',fontSize:13,outline:'none'}}/>
              <input type="color" value={addForm.color} onChange={e=>setAddForm(f=>({...f,color:e.target.value}))} style={{width:38,height:38,borderRadius:6,border:'2px solid rgba(255,255,255,.22)',background:'none',cursor:'pointer',padding:2}}/>
            </div>

          </div>
        )}
      </div>
      <div style={{flex:1,position:'relative',overflow:'hidden',background:'#000',cursor:addMode?'crosshair':'grab'}}
        onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
        onClick={e=>{if(!addMode)return;const r=e.currentTarget.getBoundingClientRect();const x=parseFloat(((e.clientX-r.left)/r.width*100).toFixed(1));const y=parseFloat(((e.clientY-r.top)/r.height*100).toFixed(1));setMapPins(p=>[...p,{id:Date.now(),x,y,...addForm}]);setAddMode(false);}}>
        <div style={{width:'100%',height:'100%',transform:`scale(${zoom}) translate(${pan.x/zoom}px,${pan.y/zoom}px)`,transformOrigin:'center center',transition:'transform .05s',position:'relative'}}>
          <img src="assets/map.webp" alt="" onError={e=>e.target.style.display='none'} style={{width:'100%',height:'100%',objectFit:'contain',display:'block'}}/>

            <div key={sg} onClick={e=>{e.stopPropagation();setSelPin({type:'stage',stage:sg,sc});}} style={{position:'absolute',left:`${pos.x}%`,top:`${pos.y}%`,transform:'translate(-50%,-50%)',cursor:'pointer',zIndex:10}}>
              <div style={{width:38,height:38,borderRadius:'50%',background:'#000',border:`2px solid ${sc.p}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <img src={EMB(sc.key)} alt="" style={{width:30,height:30,objectFit:'contain'}}/>
              </div>

          );})}
          {mapPins.map(pin=>(
            <div key={pin.id} onClick={e=>{e.stopPropagation();setSelPin({type:'pin',pin});}} style={{position:'absolute',left:`${pin.x}%`,top:`${pin.y}%`,transform:'translate(-50%,-100%)',cursor:'pointer',zIndex:15}}>

        <div style={{position:'absolute',right:13,top:13,display:'flex',flexDirection:'column',gap:7,zIndex:20}}>
          {['+','−'].map(b=>(<button key={b} onClick={()=>setZoom(z=>Math.min(4,Math.max(.5,z+(b==='+'?.3:-.3))))} style={{width:36,height:36,borderRadius:8,background:'#000',border:'2px solid rgba(255,255,255,.22)',color:'rgba(255,255,255,.65)',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>{b}</button>))}

              <button onClick={()=>{setMapPins(p=>p.filter(x=>x.id!==selPin.pin.id));setSelPin(null);}} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'#ff5555',background:'#000',border:'2px solid rgba(255,85,85,.35)',borderRadius:7,padding:'5px 12px',cursor:'pointer',fontFamily:'Sora,sans-serif',fontWeight:700,textTransform:'uppercase'}}>

        {markers.length===0&&!editMark&&<div style={{textAlign:'center',padding:'14px',color:'rgba(255,255,255,.2)',fontSize:12,border:'2px dashed rgba(255,255,255,.1)',borderRadius:12}}>No markers · They appear on exports</div>}
        {markers.map(m=>(
          <div key={m.id} style={{display:'flex',alignItems:'center',gap:11,padding:'12px 0',borderBottom:'2px solid rgba(255,255,255,.1)'}}>
            <div style={{width:11,height:11,borderRadius:'50%',background:m.color,flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13,fontFamily:'Sora,sans-serif',textTransform:'uppercase'}}>{m.label}</div>
              {m.time&&<div style={{fontSize:11,color:'rgba(255,255,255,.38)',marginTop:2,fontFamily:'Space Mono,monospace'}}>{fmtT(m.time)}{m.day>0?` · ${['FRI','SAT','SUN'][m.day-1]}`:' · ALL DAYS'}</div>}
            </div>
            <button onClick={()=>setMarkers(p=>p.filter(x=>x.id!==m.id))} style={{padding:'5px 9px',borderRadius:6,background:'#000',border:'2px solid rgba(255,85,85,.35)',color:'#ff5555',display:'flex',alignItems:'center',gap:4,fontSize:12,cursor:'pointer'}}>
              <img src={ACT_IC('action-delete')} alt="" style={{width:11,height:11,mixBlendMode:'screen'}}/>
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── INSTALL + SHARED BANNER + AUDIT + ROOT ─────────────────────────── */
function InstallPrompt(){
  const[show,setShow]=React.useState(false);const[prompt,setPrompt]=React.useState(null);
  React.useEffect(()=>{const v=parseInt(LS.get('visits',0))+1;LS.set('visits',v);window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();setPrompt(e);if(v>=2&&!LS.get('installDismissed'))setShow(true);});});
  if(!show)return null;
  return(
    <div style={{position:'fixed',bottom:86,left:16,right:16,background:'#000',borderRadius:22,padding:'18px',border:`2px solid ${STAGE_CFG.kineticFIELD.p}`,zIndex:200}}>
      <div style={{display:'flex',gap:13,alignItems:'center',marginBottom:14}}>
        <img src={A('icon-192.webp')} alt="" style={{width:48,height:48,borderRadius:12,flexShrink:0}}/>
        <div><div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:15,marginBottom:3,textTransform:'uppercase'}}>ADD TO HOME SCREEN</div><div style={{fontSize:12,color:'rgba(255,255,255,.4)'}}>Offline access. Signal's rough out there.</div></div>
        <button onClick={()=>{LS.set('installDismissed',1);setShow(false);}} style={{fontSize:24,opacity:.3,padding:4,color:'#fff',background:'none',border:'none',cursor:'pointer',marginLeft:'auto'}}>×</button>
      </div>
      <div style={{display:'flex',gap:9}}>
        <button onClick={async()=>{if(prompt){await prompt.prompt();setShow(false);}}} style={{flex:1,padding:'12px',borderRadius:10,background:STAGE_CFG.kineticFIELD.p,color:'#000',fontWeight:800,fontSize:14,fontFamily:'Sora,sans-serif',border:'none',cursor:'pointer',textTransform:'uppercase'}}>INSTALL</button>
        <button onClick={()=>setShow(false)} style={{padding:'12px 18px',borderRadius:10,background:'#000',border:'2px solid rgba(255,255,255,.2)',color:'rgba(255,255,255,.38)',fontSize:14,cursor:'pointer'}}>LATER</button>
      </div>
    </div>
  );
}

function SharedBanner({sharedIds,onDismiss}){
  if(!sharedIds)return null;
  return(
    <div style={{position:'absolute',top:0,left:0,right:0,zIndex:90,background:'#000',borderBottom:`2px solid ${STAGE_CFG.stereoBLOOM.p}`,padding:'11px 18px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <span style={{fontSize:12,color:STAGE_CFG.stereoBLOOM.p,fontWeight:700,fontFamily:'Sora,sans-serif',textTransform:'uppercase'}}>VIEWING SHARED LINEUP · {sharedIds.length} SETS</span>
      <button onClick={onDismiss} style={{fontSize:12,color:'rgba(255,255,255,.45)',padding:'3px 10px',borderRadius:6,background:'#000',border:'2px solid rgba(255,255,255,.22)',cursor:'pointer',fontFamily:'Sora,sans-serif',fontWeight:700,textTransform:'uppercase'}}>DISMISS</button>
    </div>
  );
}

function App(){
  const[tab,setTab]=React.useState('home');
  const[auditOpen,setAuditOpen]=React.useState(false);
  const now=useClock();const phase=getFestPhase(now);
  const{selected,toggleSet,recon,crew,setCrew,markers,setMarkers,mapPins,setMapPins,sharedIds,setSharedIds,weather}=useApp();
  React.useEffect(()=>{window.__setTab=setTab;},[]);
  React.useEffect(()=>{if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});},[]);
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden',background:'#000'}}>
      <SharedBanner sharedIds={sharedIds} onDismiss={()=>setSharedIds(null)}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',marginTop:sharedIds?46:0,position:'relative'}}>
        <div className="anim-up" key={tab} style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {tab==='home'   &&<HomeScreen selected={selected} toggleSet={toggleSet} recon={recon} sharedIds={sharedIds} weather={weather}/>}
          {tab==='lineup' &&<LineupScreen selected={selected} toggleSet={toggleSet} recon={recon} sharedIds={sharedIds}/>}
          {tab==='mylist' &&<MySetsScreen selected={selected} toggleSet={toggleSet} recon={recon} sharedIds={sharedIds} markers={markers}/>}
          {tab==='map'    &&<MapScreen mapPins={mapPins} setMapPins={setMapPins} markers={markers} crew={crew}/>}
          {tab==='crew'   &&<CrewScreen crew={crew} setCrew={setCrew} markers={markers} setMarkers={setMarkers}/>}
        </div>
        <BottomNav tab={tab} setTab={setTab} isLive={phase.phase==='live'}/>
      </div>
      <InstallPrompt/>
      <div onContextMenu={e=>{e.preventDefault();setAuditOpen(true);}} onTouchStart={(()=>{let t;return()=>{t=setTimeout(()=>setAuditOpen(true),800);}})()}
        onTouchEnd={()=>{}} style={{position:'absolute',bottom:4,right:8,fontSize:9,color:'rgba(255,255,255,.04)',zIndex:50,userSelect:'none',fontFamily:'monospace'}}>v6.0</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
</body>
</html>
